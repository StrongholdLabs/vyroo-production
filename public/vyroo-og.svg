<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a" />
      <stop offset="50%" style="stop-color:#111111" />
      <stop offset="100%" style="stop-color:#0a0a0a" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <circle cx="600" cy="315" r="200" fill="none" stroke="#ffffff" stroke-width="0.5" />
    <circle cx="600" cy="315" r="300" fill="none" stroke="#ffffff" stroke-width="0.5" />
  </g>

  <!-- Logo mark — Vyroo concentric circles -->
  <circle cx="600" cy="220" r="48" stroke="#ffffff" stroke-width="4" fill="none" />
  <path d="M572 220c0-15.46 12.54-28 28-28s28 12.54 28 28-12.54 28-28 28" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none" />
  <circle cx="600" cy="220" r="8" fill="#ffffff" />

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" letter-spacing="-1">Vyroo</text>

  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" fill="#666666" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400">AI Assistant Platform</text>

  <!-- URL -->
  <text x="600" y="450" text-anchor="middle" fill="#444444" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400">vyroo.ai</text>
</svg>
