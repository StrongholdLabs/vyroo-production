<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="50%" style="stop-color:#1e293b" />
      <stop offset="100%" style="stop-color:#0f172a" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#94a3b8" stroke-width="0.5" />
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#94a3b8" stroke-width="0.5" />
    <circle cx="600" cy="315" r="200" fill="none" stroke="#94a3b8" stroke-width="0.5" />
    <circle cx="600" cy="315" r="300" fill="none" stroke="#94a3b8" stroke-width="0.5" />
  </g>

  <!-- Accent glow -->
  <circle cx="600" cy="280" r="120" fill="#6366f1" opacity="0.08" />

  <!-- Logo mark -->
  <circle cx="600" cy="240" r="40" fill="url(#accent)" opacity="0.9" />
  <text x="600" y="255" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700">V</text>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" letter-spacing="-1">Vyroo</text>

  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400">AI Assistant Platform</text>

  <!-- Accent line -->
  <rect x="520" y="410" width="160" height="3" rx="1.5" fill="url(#accent)" opacity="0.6" />

  <!-- URL -->
  <text x="600" y="460" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400">vyroo.ai</text>
</svg>
